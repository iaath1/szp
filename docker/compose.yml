services:
  app:
    image: 'fa8b24e1d5610626a3d1caaa1b07938b7e767975d7bff758f72a3043735b3bdb'
    container_name: szp-backend
    expose:
      - '8080'
    ports:
      - '8080:8080'
    environment: 
      - DB_USER=postgres
      - DB_PASSWORD=1234
      - DB_URL=jdbc:postgresql://db:5432/postgres
    depends_on:
      - db

  db:
    image: 'postgres'
    container_name: db
    expose:
      - '5432'
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=1234